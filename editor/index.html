<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Storytime Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Nunito+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f7f0e3;
        --paper-2: #efe2cb;
        --ink: #2f2518;
        --wood: #8a5a2d;
        --wood-dark: #5a3516;
        --gold: #c99a2e;
        --gold-soft: #ddba62;
        --line: #cfb894;
        --ok: #2f7a47;
        --danger: #9a3420;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Nunito Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 10%, rgba(255, 242, 210, 0.68), transparent 30%),
          radial-gradient(circle at 88% 16%, rgba(230, 194, 124, 0.35), transparent 26%),
          linear-gradient(135deg, #f9f3e8 0%, #ead8b8 52%, #e8d8bc 100%);
        min-height: 100vh;
      }

      .app {
        max-width: 1500px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        grid-template-columns: 280px 1fr 320px;
        gap: 16px;
      }

      .panel {
        background: linear-gradient(180deg, rgba(255, 250, 239, 0.93), rgba(245, 235, 213, 0.95));
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 16px 30px rgba(68, 38, 13, 0.14);
        overflow: hidden;
      }

      .panel-head {
        background: linear-gradient(90deg, var(--wood-dark), var(--wood));
        color: #fdf6e9;
        padding: 12px 14px;
        font-family: "Cormorant Garamond", serif;
        font-size: 23px;
        letter-spacing: 0.4px;
      }

      .panel-body {
        padding: 14px;
      }

      h1, h2, h3 {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-weight: 700;
        line-height: 1.15;
      }

      .brand {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 14px 18px;
        background:
          linear-gradient(120deg, rgba(120, 67, 27, 0.95), rgba(165, 104, 42, 0.88)),
          linear-gradient(45deg, rgba(255, 230, 180, 0.35), transparent);
        color: #ffefcc;
      }

      .brand h1 {
        font-size: 38px;
      }

      .brand .status {
        font-size: 14px;
        border: 1px solid rgba(255, 236, 184, 0.5);
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(75, 40, 14, 0.35);
      }

      .story-list {
        display: grid;
        gap: 8px;
        max-height: 52vh;
        overflow: auto;
      }

      .story-item {
        border: 1px solid var(--line);
        background: rgba(255, 248, 233, 0.95);
        border-radius: 10px;
        padding: 9px;
        cursor: pointer;
      }

      .story-item.active {
        border-color: var(--gold);
        box-shadow: 0 0 0 2px rgba(201, 154, 46, 0.24);
      }

      .meta {
        font-size: 12px;
        opacity: 0.8;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
      }

      label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        font-weight: 700;
      }

      input, textarea, select {
        width: 100%;
        font: inherit;
        border-radius: 10px;
        border: 1px solid #bea882;
        padding: 9px 10px;
        background: #fff9eb;
      }

      textarea { min-height: 84px; resize: vertical; }

      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .tab-btn,
      .btn {
        border: 1px solid rgba(93, 55, 23, 0.35);
        background: linear-gradient(180deg, #f9e6b9, #e0bb74);
        color: #4d2f13;
        border-radius: 999px;
        padding: 8px 12px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .tab-btn.active {
        background: linear-gradient(180deg, #ffd977, #da9b17);
      }

      .btn.flat {
        background: #fff9eb;
      }

      .btn.flat.active {
        border-color: #8a6a2f;
        box-shadow: 0 0 0 2px rgba(138, 106, 47, 0.18);
      }

      .btn.warn {
        background: linear-gradient(180deg, #f9c8a9, #e08a61);
      }

      .btn.ok {
        background: linear-gradient(180deg, #b9e7c6, #77bd8e);
      }

      .btn:disabled,
      .tab-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .stack { display: grid; gap: 12px; }

      .card {
        border: 1px solid #cab28d;
        border-radius: 13px;
        padding: 10px;
        background: #fff8e9;
      }

      .card h3 {
        font-size: 22px;
        margin-bottom: 8px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .queue-list {
        display: grid;
        gap: 8px;
        max-height: 70vh;
        overflow: auto;
      }

      .event-feed {
        display: grid;
        gap: 6px;
        max-height: 24vh;
        overflow: auto;
      }

      .event-item {
        border: 1px solid #ccb794;
        border-radius: 8px;
        padding: 7px 8px;
        background: #fff8e9;
        font-size: 12px;
      }

      .queue-item {
        border: 1px solid #c6b18d;
        border-radius: 10px;
        padding: 9px;
        background: #fff8ea;
      }

      .job-pending { border-left: 4px solid #cc9a36; }
      .job-running { border-left: 4px solid #2f71a8; }
      .job-completed { border-left: 4px solid var(--ok); }
      .job-failed { border-left: 4px solid var(--danger); }

      .hint { font-size: 12px; opacity: 0.75; }

      .preview-page {
        border: 1px solid #c9ad80;
        border-radius: 14px;
        overflow: hidden;
        background: #fff8e9;
      }

      .preview-page img {
        display: block;
        width: 100%;
        max-height: 200px;
        object-fit: contain;
        background: #f0dfbf;
      }

      @media (max-width: 1180px) {
        .app { grid-template-columns: 1fr; }
        .brand { flex-direction: column; align-items: flex-start; gap: 8px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="brand">
        <h1>Storytime Workshop</h1>
        <div class="status" id="socketStatus">Socket: idle</div>
      </div>

      <section class="panel">
        <div class="panel-head">Lobby</div>
        <div class="panel-body">
          <div class="field">
            <label for="apiBase">API Base</label>
            <input id="apiBase" />
          </div>
          <div class="actions" style="margin-bottom: 12px;">
            <button class="btn" data-action="reload-stories">Reload</button>
            <button class="btn flat" data-action="disconnect">Disconnect</button>
          </div>
          <div class="story-list" id="storyList"></div>
          <hr style="border:none;border-top:1px solid #d3bf99;margin:12px 0;" />
          <div class="field">
            <label for="newTitle">New Story Title</label>
            <input id="newTitle" placeholder="The Moonlit Garden" />
          </div>
          <div class="field">
            <label for="newStyle">Art Style</label>
            <input id="newStyle" placeholder="Watercolor, soft pastel" />
          </div>
          <button class="btn ok" data-action="create-story">Create Story</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">Editor</div>
        <div class="panel-body">
          <div class="tabs" id="tabs"></div>
          <div class="hint" style="margin-bottom: 8px;">Fast path: 1) Generate All 2) Deploy 3) Open Deploy URL from Story tab.</div>
          <div class="actions" style="margin-bottom: 10px;">
            <button class="btn" id="btnGenerateAllScenes" data-action="generate-all-scenes">Generate Scenes</button>
            <button class="btn" id="btnGenerateAllAudio" data-action="generate-all-audio">Generate Audio</button>
            <button class="btn" id="btnGenerateAllDialogue" data-action="generate-all-dialogue">Generate All Dialogue + Voices</button>
            <button class="btn ok" id="btnGenerateAll" data-action="generate-all">Generate All</button>
            <input id="deploySubdomain" placeholder="deploy-subdomain" style="max-width:220px;" />
            <button class="btn warn" data-action="deploy-story">Deploy</button>
          </div>
          <div class="hint" id="dialogueBatchStatus" style="margin-bottom: 10px;"></div>
          <div id="tabContent"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">Generation Queue</div>
        <div class="panel-body">
          <div class="actions" style="margin-bottom:8px;">
            <button class="btn flat" data-action="queue-filter" data-filter="all">All</button>
            <button class="btn flat" data-action="queue-filter" data-filter="active">Active</button>
            <button class="btn flat" data-action="queue-filter" data-filter="failed">Failed</button>
            <input id="queueSearch" placeholder="Filter text (job type / speaker / target)" style="max-width:280px;" />
            <button class="btn flat" data-action="clear-events">Clear Events</button>
          </div>
          <div class="hint" id="queueSummary" style="margin-bottom: 8px;"></div>
          <div class="hint" style="margin-bottom: 8px;">Tracks pending/running/completed/failed generation and deploy jobs.</div>
          <div class="queue-list" id="queueList"></div>
          <hr style="border:none;border-top:1px solid #d3bf99;margin:12px 0;" />
          <div class="hint" style="margin-bottom: 8px;">Recent channel events.</div>
          <div class="event-feed" id="eventFeed"></div>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phoenix@1.7.14/priv/static/phoenix.min.js"></script>
    <script>
      const tabs = ["story", "cast", "pages", "music", "preview"];

      const state = {
        apiBase: window.location.search.includes("api=")
          ? decodeURIComponent(new URLSearchParams(window.location.search).get("api"))
          : "https://storytime-api-091733.onrender.com",
        wsBase: "",
        stories: [],
        currentStory: null,
        currentTab: "story",
        jobs: [],
        socket: null,
        channel: null,
        jobsPoll: null,
        previewPack: null,
        recentEvents: [],
        jobProgress: {},
        queueFilter: "all",
        queueSearch: "",
        characterVoicePreview: {},
        voiceOptions: [],
        voiceLoadError: null
      };

      const $ = (id) => document.getElementById(id);
      const esc = (value) => String(value ?? "").replace(/[&<>\"']/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));

      function setStatus(text, ok = true) {
        const el = $("socketStatus");
        el.textContent = text;
        el.style.borderColor = ok ? "rgba(140, 230, 160, 0.5)" : "rgba(255, 170, 170, 0.55)";
        el.style.background = ok ? "rgba(12, 68, 24, 0.36)" : "rgba(104, 25, 25, 0.33)";
      }

      function withApi(path) {
        return `${state.apiBase.replace(/\/$/, "")}${path}`;
      }

      function assetUrl(path) {
        if (!path) return "";
        if (/^https?:\/\//i.test(path)) return path;
        return withApi(path);
      }

      async function api(path, opts = {}) {
        const res = await fetch(withApi(path), {
          headers: {"content-type": "application/json", ...(opts.headers || {})},
          ...opts
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
        return body;
      }

      function wsBase() {
        return state.apiBase.replace(/^https:\/\//, "wss://").replace(/^http:\/\//, "ws://").replace(/\/$/, "");
      }

      async function loadStories() {
        try {
          const data = await api("/api/stories");
          state.stories = data.stories || [];
          if (state.currentStory) {
            const fresh = state.stories.find((s) => s.id === state.currentStory.id);
            if (!fresh) {
              state.currentStory = null;
              disconnectChannel();
            }
          }
          renderStoryList();
        } catch (err) {
          setStatus(`API error: ${err.message}`, false);
        }
      }

      async function loadVoices() {
        state.voiceLoadError = null;

        try {
          const payload = await api("/api/voices/elevenlabs");
          state.voiceOptions = payload.voices || [];
        } catch (err) {
          state.voiceOptions = [];
          state.voiceLoadError = err.message || "failed_to_load_voices";
        }

        if (state.currentTab === "cast") renderTabContent();
      }

      async function generateCharacterVoicePreview(characterId) {
        const character = currentCharacters().find((entry) => entry.id === characterId);
        if (!character) throw new Error("character_not_found");

        const selectedVoiceId = $(`char-voice-${characterId}`)?.value || "";
        if (!isValidVoiceId(selectedVoiceId)) throw new Error("select_a_valid_voice");

        const text = ($(`char-preview-text-${characterId}`)?.value || "").trim();
        if (!text) throw new Error("preview_text_required");

        state.characterVoicePreview[characterId] = { status: "loading", text };
        renderTabContent();

        try {
          const payload = await api("/api/voices/preview", {
            method: "POST",
            body: JSON.stringify({
              provider: "elevenlabs",
              voice_id: selectedVoiceId,
              model_id: character.voice_model_id || "eleven_multilingual_v2",
              text
            })
          });

          state.characterVoicePreview[characterId] = {
            status: "ready",
            text,
            url: payload.audio_data_url
          };
        } catch (err) {
          state.characterVoicePreview[characterId] = {
            status: "error",
            text,
            error: err.message || "preview_failed"
          };
          throw err;
        } finally {
          renderTabContent();
        }
      }

      async function createStory() {
        const title = $("newTitle").value.trim() || "Untitled Story";
        const art_style = $("newStyle").value.trim() || "storybook watercolor";
        const data = await api("/api/stories", {
          method: "POST",
          body: JSON.stringify({ title, art_style })
        });
        $("newTitle").value = "";
        await loadStories();
        await selectStory(data.story.id);
      }

      async function selectStory(storyId) {
        const payload = await api(`/api/stories/${encodeURIComponent(storyId)}`);
        state.currentStory = payload.story;
        state.previewPack = null;
        renderStoryList();
        renderTabs();
        renderTabContent();
        await connectChannel();
        await loadJobs();
        if (!state.voiceOptions.length) await loadVoices();
      }

      async function loadStoryFull() {
        if (!state.currentStory) return;
        const payload = await api(`/api/stories/${encodeURIComponent(state.currentStory.id)}`);
        state.currentStory = payload.story;
        renderStoryList();
        renderTabContent();
        renderGlobalActions();
      }

      async function loadJobs() {
        if (!state.currentStory) return;
        try {
          const payload = await api(`/api/stories/${encodeURIComponent(state.currentStory.id)}/jobs`);
          state.jobs = payload.jobs || [];
          renderJobs();
          renderGlobalActions();
        } catch (_err) {}
      }

      async function connectChannel() {
        if (!state.currentStory) return;
        disconnectChannel();

        state.socket = new window.Phoenix.Socket(`${wsBase()}/socket`, { params: { client: "editor-spa" } });
        state.socket.connect();

        state.channel = state.socket.channel(`story:${state.currentStory.id}`, { role: "editor" });

        [
          "story_updated","character_added","character_updated","character_deleted",
          "page_added","page_updated","page_deleted","pages_reordered",
          "dialogue_line_added","dialogue_line_updated","dialogue_line_deleted",
          "music_track_added","music_track_updated","music_track_deleted",
          "music_span_added","music_span_updated","music_span_deleted",
          "generation_started","generation_progress","generation_completed","generation_failed",
          "deploy_started","deploy_completed","deploy_failed"
        ].forEach((eventName) => {
          state.channel.on(eventName, async (payload) => {
            recordEvent(eventName, payload || {});
            await Promise.all([loadStoryFull(), loadJobs()]);
            if (state.currentTab === "preview") await loadPreviewPack();
          });
        });

        state.channel.join()
          .receive("ok", () => setStatus("Socket: connected", true))
          .receive("error", (resp) => setStatus(`Socket join failed: ${JSON.stringify(resp)}`, false));

        clearInterval(state.jobsPoll);
        state.jobsPoll = setInterval(loadJobs, 3000);
      }

      function disconnectChannel() {
        if (state.jobsPoll) clearInterval(state.jobsPoll);
        state.jobsPoll = null;
        if (state.channel) state.channel.leave();
        if (state.socket) state.socket.disconnect();
        state.channel = null;
        state.socket = null;
        setStatus("Socket: idle", true);
        renderGlobalActions();
      }

      function push(event, payload) {
        return new Promise((resolve, reject) => {
          if (!state.channel) return reject(new Error("channel_not_connected"));
          state.channel.push(event, payload)
            .receive("ok", (resp) => resolve(resp))
            .receive("error", (resp) => reject(new Error(resp.error || "event_error")));
        });
      }

      function renderStoryList() {
        const root = $("storyList");
        if (!state.stories.length) {
          root.innerHTML = '<div class="hint">No stories yet. Create your first story.</div>';
          return;
        }

        root.innerHTML = state.stories.map((story) => {
          const active = state.currentStory && story.id === state.currentStory.id;
          return `
            <button class="story-item ${active ? "active" : ""}" data-action="pick-story" data-story-id="${story.id}">
              <div><strong>${esc(story.title)}</strong></div>
              <div class="meta">${esc(story.slug)} | ${esc(story.status)}</div>
            </button>
          `;
        }).join("");
      }

      function renderTabs() {
        $("tabs").innerHTML = tabs.map((tab) => `
          <button class="tab-btn ${state.currentTab === tab ? "active" : ""}" data-action="switch-tab" data-tab="${tab}">
            ${tab[0].toUpperCase() + tab.slice(1)}
          </button>
        `).join("");
      }

      function currentCharacters() {
        return (state.currentStory?.characters || []).slice().sort((a, b) => a.sort_order - b.sort_order);
      }

      function currentPages() {
        return (state.currentStory?.pages || []).slice().sort((a, b) => a.page_index - b.page_index);
      }

      function currentTracks() {
        return (state.currentStory?.music_tracks || []);
      }

      function latestJob(jobType, targetId) {
        return (state.jobs || []).find((job) => job.job_type === jobType && job.target_id === targetId);
      }

      function progressFor(job) {
        if (!job) return null;
        return typeof state.jobProgress[job.id] === "number" ? state.jobProgress[job.id] : null;
      }

      function humanSeconds(value) {
        if (typeof value !== "number" || Number.isNaN(value)) return null;
        if (value < 60) return `${value}s`;
        const mins = Math.floor(value / 60);
        const secs = value % 60;
        if (mins < 60) return `${mins}m ${secs}s`;
        const hrs = Math.floor(mins / 60);
        const remMins = mins % 60;
        return `${hrs}h ${remMins}m`;
      }

      function compactText(value, max = 110) {
        if (!value) return "";
        const text = String(value).trim();
        if (!text) return "";
        return text.length > max ? `${text.slice(0, max - 3)}...` : text;
      }

      function isActiveStatus(status) {
        return status === "pending" || status === "running";
      }

      function hasActiveJobType(jobType) {
        return (state.jobs || []).some((job) => job.job_type === jobType && isActiveStatus(job.status));
      }

      function hasActiveDialogueJobForPage(page) {
        const lineIds = new Set((page.dialogue_lines || []).map((line) => line.id));

        return (state.jobs || []).some((job) => {
          if (!isActiveStatus(job.status)) return false;
          if (job.job_type === "dialogue" && job.target_id === page.id) return true;
          if (job.job_type === "dialogue_tts" && lineIds.has(job.target_id)) return true;
          return false;
        });
      }

      function dialogueTtsSummaryForPage(page) {
        const lineIds = new Set((page.dialogue_lines || []).map((line) => line.id));
        if (!lineIds.size) return "";

        const related = (state.jobs || []).filter((job) => job.job_type === "dialogue_tts" && lineIds.has(job.target_id));
        if (!related.length) return "";

        const counts = { pending: 0, running: 0, completed: 0, failed: 0 };
        for (const job of related) {
          const key = counts[job.status] === undefined ? "pending" : job.status;
          counts[key] += 1;
        }

        return `Voice jobs • pending ${counts.pending} • running ${counts.running} • completed ${counts.completed} • failed ${counts.failed}`;
      }

      function renderGlobalActions() {
        const noStory = !state.currentStory;
        const dialogueBusy = hasActiveJobType("dialogue") || hasActiveJobType("dialogue_tts");

        const scenes = $("btnGenerateAllScenes");
        const audio = $("btnGenerateAllAudio");
        const dialogue = $("btnGenerateAllDialogue");
        const all = $("btnGenerateAll");
        const status = $("dialogueBatchStatus");

        if (scenes) scenes.disabled = noStory;
        if (audio) audio.disabled = noStory;
        if (all) all.disabled = noStory;

        if (dialogue) {
          dialogue.disabled = noStory || dialogueBusy;
          dialogue.textContent = dialogueBusy ? "Generating Dialogue..." : "Generate All Dialogue + Voices";
        }

        if (status) {
          if (noStory) {
            status.textContent = "";
          } else if (dialogueBusy) {
            status.textContent = "Dialogue generation is in progress. Buttons are temporarily disabled to avoid duplicate queues.";
          } else {
            status.textContent = "Generate All Dialogue + Voices fills empty pages with dialogue and immediately queues ElevenLabs audio.";
          }
        }
      }

      function voiceOptionsMarkup(selected) {
        const options = state.voiceOptions || [];
        const selectedExists = options.some((v) => v.id === selected);
        const parts = [];

        if (selected && !selectedExists) {
          parts.push(`<option value="${esc(selected)}">${esc(selected)} (current)</option>`);
        }

        for (const voice of options) {
          const label = [voice.name || voice.id, voice.category].filter(Boolean).join(" • ");
          parts.push(`<option value="${esc(voice.id)}">${esc(label)}</option>`);
        }

        return parts.join("");
      }

      function voiceById(voiceId) {
        if (!voiceId) return null;
        return (state.voiceOptions || []).find((voice) => voice.id === voiceId) || null;
      }

      function isValidVoiceId(voiceId) {
        return !!voiceById(voiceId);
      }

      function voiceCharacteristicLabel(voice) {
        if (!voice || !voice.labels || typeof voice.labels !== "object") return "";
        const interesting = ["gender", "accent", "age", "descriptive", "use_case", "language"];
        const parts = interesting
          .map((key) => voice.labels[key])
          .filter((value) => typeof value === "string" && value.trim() !== "")
          .slice(0, 3);
        return parts.join(" • ");
      }

      function voiceSelectMarkup(selectedVoiceId, selectId) {
        const options = state.voiceOptions || [];
        const validSelected = isValidVoiceId(selectedVoiceId) ? selectedVoiceId : "";
        return `
          <select id="${selectId}">
            <option value="">Select a voice...</option>
            ${options.map((voice) => {

      function renderTabContent() {

        if (state.currentTab === "pages") root.innerHTML = renderPagesTab();

      }

      function renderJobs() {
        const root = $("queueList");
        const summary = $("queueSummary");
        if (!state.currentStory) {
          root.innerHTML = '<div class="hint">Pick a story first.</div>';
          summary.textContent = "";
          renderEventFeed();
          return;
        }

        if (!state.jobs.length) {
          root.innerHTML = '<div class="hint">No jobs yet.</div>';
          summary.textContent = "No jobs tracked yet.";
          renderEventFeed();
          return;
        }

        const counts = { pending: 0, running: 0, completed: 0, failed: 0 };
        for (const job of state.jobs) {
          const status = job.status || "pending";
          counts[status] = (counts[status] || 0) + 1;
        }
        const dialoguePending = state.jobs.filter((job) => job.job_type === "dialogue_tts" && job.status === "pending").length;
        const dialogueRunning = state.jobs.filter((job) => job.job_type === "dialogue_tts" && job.status === "running").length;
        summary.textContent = `pending ${counts.pending || 0} • running ${counts.running || 0} • completed ${counts.completed || 0} • failed ${counts.failed || 0} • dialogue_tts pending ${dialoguePending} running ${dialogueRunning} • filter ${state.queueFilter}`;

        document.querySelectorAll('[data-action="queue-filter"]').forEach((button) => {
          button.classList.toggle("active", button.dataset.filter === state.queueFilter);
        });

        const search = (state.queueSearch || "").trim().toLowerCase();
        const filteredJobs = state.jobs.filter((job) => {
          if (state.queueFilter === "active" && !isActiveStatus(job.status)) return false;
          if (state.queueFilter === "failed" && job.status !== "failed") return false;
          if (!search) return true;

          const haystack = [
            job.job_type,
            job.status,
            job.target_label,
            job.target_id,
            job.character_name,
            job.text_preview,
            job.error
          ].filter(Boolean).join(" ").toLowerCase();

          return haystack.includes(search);
        });

        if (!filteredJobs.length) {
          root.innerHTML = '<div class="hint">No jobs match the current filter.</div>';
          renderEventFeed();
          return;
        }

        root.innerHTML = filteredJobs.map((job) => {
          const status = job.status || "pending";
          const progress = state.jobProgress[job.id];
          const oban = job.oban || null;
          const retryBusy = hasActiveJobType(job.job_type);
          const canRetry = status === "failed" && job.job_type !== "deploy" && !retryBusy;
          const obanMetaParts = [];
          if (oban && oban.state) obanMetaParts.push(`oban ${oban.state}`);
          if (oban && oban.queue) obanMetaParts.push(`queue ${oban.queue}`);
          if (oban && typeof oban.attempt === "number" && typeof oban.max_attempts === "number") {
            obanMetaParts.push(`attempt ${oban.attempt}/${oban.max_attempts}`);
          }

          const wait =
            oban && typeof oban.available_in_seconds === "number" && oban.available_in_seconds > 0
              ? humanSeconds(oban.available_in_seconds)
              : null;
          const age = typeof job.age_seconds === "number" ? humanSeconds(job.age_seconds) : null;
          const queuePosition = typeof job.queue_position === "number" ? job.queue_position : null;
          const preview = compactText(job.text_preview, 115);
          const targetMeta = compactText(job.target_label || "");

          return `
            <div class="queue-item job-${esc(status)}">
              <div><strong>${esc(job.job_type)}</strong> • ${esc(status)}</div>
              <div class="meta">target: ${esc(targetMeta || job.target_id || "n/a")}</div>
              ${job.character_name ? `<div class="meta">speaker: ${esc(job.character_name)}</div>` : ""}
              ${typeof job.page_number === "number" ? `<div class="meta">page: ${esc(job.page_number)}</div>` : ""}
              ${preview ? `<div class="meta">text: ${esc(preview)}</div>` : ""}
              ${age ? `<div class="meta">age: ${esc(age)}</div>` : ""}
              ${queuePosition ? `<div class="meta">queue position: ${esc(queuePosition)}</div>` : ""}
              ${job.active_detail ? `<div class="meta">${esc(job.active_detail)}</div>` : ""}
              ${typeof progress === "number" ? `<div class="meta">progress: ${progress}%</div>` : ""}
              ${obanMetaParts.length ? `<div class="meta">${esc(obanMetaParts.join(" • "))}</div>` : ""}
              ${wait ? `<div class="meta">next retry window: ${esc(wait)}</div>` : ""}
              ${oban && oban.last_error ? `<div class="meta" style="color:#872d1a;">worker error: ${esc(compactText(oban.last_error, 180))}</div>` : ""}
              ${job.error ? `<div style="color:#872d1a;">${esc(job.error)}</div>` : ""}
              ${status === "failed" && job.job_type !== "deploy" ? `<div class="actions" style="margin-top:8px;"><button class="btn" data-action="retry-job" data-job-id="${job.id}" ${canRetry ? "" : "disabled"}>${canRetry ? "Retry" : "Retrying..."}</button></div>` : ""}
            </div>
          `;
        }).join("");

        renderEventFeed();
      }

      function recordEvent(eventName, payload) {
        const stamp = new Date().toLocaleTimeString();
        state.recentEvents.unshift({
          eventName,
          payload,
          stamp
        });
        state.recentEvents = state.recentEvents.slice(0, 24);

        if (eventName === "generation_progress" && payload.job_id) {
          state.jobProgress[payload.job_id] = Number(payload.progress || 0);
        }

        if ((eventName === "generation_completed" || eventName === "generation_failed") && payload.job_id) {
          delete state.jobProgress[payload.job_id];
        }

        if (eventName === "deploy_completed" && payload.url) {
          setStatus(`Deploy live: ${payload.url}`, true);
        }

        if (eventName === "deploy_failed") {
          setStatus(`Deploy failed: ${payload.error || "unknown"}`, false);
        }
      }

      function renderEventFeed() {
        const root = $("eventFeed");
        if (!root) return;

        if (!state.recentEvents.length) {
          root.innerHTML = '<div class="hint">No events yet.</div>';
          return;
        }

        root.innerHTML = state.recentEvents.map((item) => {
          const target = item.payload?.target_id || "n/a";
          const progress =
            typeof item.payload?.progress === "number" ? ` • ${item.payload.progress}%` : "";
          return `<div class="event-item"><strong>${esc(item.eventName)}</strong> • ${esc(item.stamp)} • target ${esc(target)}${esc(progress)}</div>`;
        }).join("");
      }

      async function reorderPages(index, direction) {
        const pages = currentPages();
        const next = pages.slice();
        const swapWith = direction === "up" ? index - 1 : index + 1;
        if (swapWith < 0 || swapWith >= next.length) return;
        [next[index], next[swapWith]] = [next[swapWith], next[index]];
        await push("reorder_pages", { page_ids: next.map((p) => p.id) });
      }

      document.body.addEventListener("click", async (event) => {
        const node = event.target.closest("[data-action]");
        if (!node) return;
        const action = node.dataset.action;

        try {
          let refreshAfterAction = true;
          if (action === "reload-stories") await loadStories();
          if (action === "load-voices") await loadVoices();
          if (action === "disconnect") disconnectChannel();
          if (action === "create-story") await createStory();
          if (action === "pick-story") await selectStory(node.dataset.storyId);
          if (action === "switch-tab") {
            state.currentTab = node.dataset.tab;
            renderTabs();
            if (state.currentTab === "preview") await loadPreviewPack();
            renderTabContent();
          }
          if (!state.currentStory) return;

          if (action === "save-story") {
            await push("update_story", {
              title: $("storyTitle").value,
              slug: $("storySlug").value,
              art_style: $("storyStyle").value
            });
          }

          if (action === "add-character") {
            const voiceId = $("newCharVoice").value || "";
            if (!isValidVoiceId(voiceId)) throw new Error("select_a_valid_voice");
            await push("add_character", {
              name: $("newCharName").value,
              visual_description: $("newCharDesc").value,
              voice_id: voiceId,
              voice_provider: "elevenlabs"
            });
          }

          if (action === "save-character") {
            const id = node.dataset.id;
            const voiceId = $(`char-voice-${id}`).value || "";
            if (!isValidVoiceId(voiceId)) throw new Error("select_a_valid_voice");
            await push("update_character", {
              id,
              name: $(`char-name-${id}`).value,
              visual_description: $(`char-desc-${id}`).value,
              voice_id: voiceId,
              voice_provider: "elevenlabs"
            });
          }

          if (action === "preview-character-voice") {
            refreshAfterAction = false;
            await generateCharacterVoicePreview(node.dataset.id);
          }

          if (action === "delete-character") await push("delete_character", { id: node.dataset.id });
          if (action === "generate-headshot") await push("generate_headshot", { character_id: node.dataset.id });

          if (action === "add-page") {
            await push("add_page", {
              scene_description: $("newPageScene").value,
              narration_text: $("newPageNarration").value
            });
          }

          if (action === "save-page") {
            const id = node.dataset.id;
            await push("update_page", {
              id,
              page_index: Number($(`page-index-${id}`).value),
              sort_order: Number($(`page-sort-${id}`).value),
              scene_description: $(`page-scene-${id}`).value,
              narration_text: $(`page-narration-${id}`).value
            });
          }

          if (action === "delete-page") await push("delete_page", { id: node.dataset.id });
          if (action === "page-up") await reorderPages(Number(node.dataset.index), "up");
          if (action === "page-down") await reorderPages(Number(node.dataset.index), "down");
          if (action === "generate-scene") await push("generate_scene", { page_id: node.dataset.id });
          if (action === "generate-narration") await push("generate_narration_audio", { page_id: node.dataset.id });
          if (action === "generate-page-dialogue") {
            const pageId = node.dataset.id;
            const lineCount = Number($(`page-dialogue-count-${pageId}`)?.value || 3);
            await push("generate_dialogue", { page_id: pageId, line_count: lineCount });
          }

          if (action === "add-line") {
            const pageId = node.dataset.pageId;
            await push("add_dialogue_line", {
              page_id: pageId,
              character_id: $(`new-line-char-${pageId}`).value,
              text: $(`new-line-text-${pageId}`).value
            });
          }

          if (action === "save-line") {
            const id = node.dataset.id;
            await push("update_dialogue_line", {
              id,
              character_id: $(`line-char-${id}`).value,
              sort_order: Number($(`line-sort-${id}`).value),
              text: $(`line-text-${id}`).value
            });
          }

          if (action === "delete-line") await push("delete_dialogue_line", { id: node.dataset.id });
          if (action === "generate-line") await push("generate_dialogue_audio", { dialogue_line_id: node.dataset.id });

          if (action === "add-track") {
            await push("add_music_track", {
              title: $("newTrackTitle").value,
              mood: $("newTrackMood").value
            });
          }

          if (action === "save-track") {
            const id = node.dataset.id;
            await push("update_music_track", {
              id,
              title: $(`track-title-${id}`).value,
              mood: $(`track-mood-${id}`).value
            });
          }

          if (action === "delete-track") await push("delete_music_track", { id: node.dataset.id });
          if (action === "generate-music") await push("generate_music", { track_id: node.dataset.id });

          if (action === "add-span") {
            const trackId = node.dataset.trackId;
            await push("add_music_span", {
              track_id: trackId,
              start_page_index: Number($(`new-span-start-${trackId}`).value),
              end_page_index: Number($(`new-span-end-${trackId}`).value),
              loop: true
            });
          }

          if (action === "save-span") {
            const id = node.dataset.id;
            await push("update_music_span", {
              id,
              start_page_index: Number($(`span-start-${id}`).value),
              end_page_index: Number($(`span-end-${id}`).value),
              loop: true
            });
          }

          if (action === "delete-span") await push("delete_music_span", { id: node.dataset.id });

          if (action === "generate-all-scenes") await push("generate_all_scenes", {});
          if (action === "generate-all-dialogue") await push("generate_all_dialogue", {});
          if (action === "generate-all-audio") await push("generate_all_audio", {});
          if (action === "generate-all") await push("generate_all", {});
          if (action === "retry-job") await push("retry_generation", { job_id: node.dataset.jobId, source: "queue_retry" });
          if (action === "queue-filter") {
            refreshAfterAction = false;
            state.queueFilter = node.dataset.filter || "all";
            renderJobs();
          }
          if (action === "clear-events") {
            refreshAfterAction = false;
            state.recentEvents = [];
            renderEventFeed();
          }

          if (action === "deploy-story") {
            const subdomain = $("deploySubdomain").value.trim() || (state.currentStory.slug || "story");
            await push("deploy_story", { subdomain });
          }

          if (action === "refresh-preview") await loadPreviewPack();

          if (refreshAfterAction) {
            await Promise.all([loadStoryFull(), loadJobs()]);
            if (state.currentTab === "preview") await loadPreviewPack();
          }
        } catch (err) {
          setStatus(`Action error: ${err.message}`, false);
        }
      });

      $("queueSearch").addEventListener("input", (event) => {
        state.queueSearch = event.target.value || "";
        renderJobs();
      });

      (async function boot() {
        $("apiBase").value = state.apiBase;
        $("apiBase").addEventListener("change", () => {
          state.apiBase = $("apiBase").value.trim().replace(/\/$/, "");
        });

        renderTabs();
        renderStoryList();
        renderTabContent();
        renderJobs();
        renderGlobalActions();
        await loadStories();
      })();
    </script>
  </body>
</html>
