<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Storytime Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="reader-shell">
      <main class="stage" id="stage">
        <header class="top-hud">
          <div class="glass-panel top-hud-card">
            <h1 class="story-title" id="storyTitle">Storytime Reader</h1>
            <div class="story-meta" id="storyMeta">Loading story...</div>
          </div>
          <div class="glass-panel presence-chip" id="collabPill">Readers: 1</div>
        </header>

        <section class="scene-layer">
          <div class="scene-bg" id="sceneBg"></div>
          <div class="scene-vignette"></div>
          <div class="scene-card" id="sceneBox"></div>
          <div class="cursor-layer" id="cursorLayer"></div>
        </section>

        <section class="glass-panel text-deck">
          <div class="narration" id="narration"></div>
          <div class="dialogue-list" id="dialogueList"></div>
        </section>

        <section class="controls-dock">
          <div class="glass-panel dock-row">
            <button class="stone-btn" data-action="prev-page">Prev</button>
            <button class="stone-btn" data-action="toggle-mode" data-emphasis="true" id="modeLabel">Read Alone</button>
            <button class="stone-btn" data-action="next-page">Next</button>
            <div class="status-row" id="pageLabel">Page 0 / 0</div>
          </div>
          <div class="glass-panel dock-row page-dots" id="pageDots"></div>
        </section>

        <section class="screen-error" id="errorScreen" hidden>
          <div class="glass-panel screen-error-card">
            <h2 id="errorScreenTitle">Reader Error</h2>
            <p class="info" id="errorScreenBody"></p>
          </div>
        </section>
      </main>

      <aside class="sidebar">
        <section class="sidebar-card">
          <h2>Playback</h2>
          <div class="row">
            <button class="stone-btn" data-action="play-narration">Narration</button>
            <button class="stone-btn" data-action="play-page-dialogue">Dialogue</button>
            <button class="stone-btn" data-action="play-narration-dialogue">Narrate Page</button>
          </div>
          <div class="row">
            <button class="stone-btn" data-action="pause-voice">Pause</button>
            <button class="stone-btn" data-action="resume-voice">Resume</button>
            <button class="stone-btn" data-action="stop-voice">Stop</button>
          </div>
          <div class="info" id="playbackLabel">Voice: idle</div>
          <div class="info" id="timingLabel">Timing: ready</div>
        </section>

        <section class="sidebar-card">
          <h2>Mix</h2>
          <label class="info" for="voiceVolume">Voice Volume</label>
          <input class="slider" id="voiceVolume" type="range" min="0" max="1" step="0.01" value="0.9" />
          <label class="info" for="musicVolume">Music Volume</label>
          <input class="slider" id="musicVolume" type="range" min="0" max="1" step="0.01" value="0.35" />
        </section>

        <section class="sidebar-card">
          <h2>Collaboration</h2>
          <div class="row">
            <button class="stone-btn" data-action="toggle-host">Toggle Host</button>
            <button class="stone-btn" data-action="toggle-follow">Toggle Follow</button>
          </div>
          <div class="info" id="collabStatus"></div>
          <div class="presence-list" id="presenceList"></div>
        </section>

        <section class="sidebar-card" id="packConfigCard" hidden>
          <h2>Story Source</h2>
          <div class="info">Paste StoryPack URL, then load.</div>
          <input class="text-input" id="packUrlInput" type="text" placeholder="https://.../api/stories/<id>/pack" />
          <div class="row">
            <button class="stone-btn" data-action="apply-pack-url">Load Pack URL</button>
            <button class="stone-btn" data-action="clear-pack-url">Clear URL</button>
          </div>
          <div class="info" id="packConfigStatus"></div>
        </section>

        <section class="sidebar-card">
          <h2>Runtime</h2>
          <div class="info" id="runtimeErrorLabel"></div>
        </section>
      </aside>
    </div>

    <audio id="voiceAudio" preload="metadata"></audio>
    <audio id="musicA" preload="metadata" loop></audio>
    <audio id="musicB" preload="metadata" loop></audio>

    <script src="https://unpkg.com/@instantdb/core@0.22.143/dist/standalone/index.umd.cjs"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
