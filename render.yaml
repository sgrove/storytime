services:
  - type: web
    name: storytime-api
    runtime: elixir
    plan: starter
    region: oregon
    healthCheckPath: /health
    buildCommand: |
      mix deps.get --only prod
      MIX_ENV=prod mix deps.compile
      MIX_ENV=prod mix compile
    startCommand: |
      MIX_ENV=prod mix ecto.migrate
      MIX_ENV=prod mix phx.server
    envVars:
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PHX_HOST
        value: storytime-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: storytime-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: SONAUTO_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_READER_TEMPLATE_SERVICE_ID
        value: srv-d6fiv3haae7s73as3ch0
      - key: INSTANT_APP_ID
        sync: false
    disk:
      name: storytime-assets
      mountPath: /app/assets
      sizeGB: 1

  - type: web
    name: storytime-editor
    runtime: static
    buildCommand: |
      echo "editor static"
    staticPublishPath: editor
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: storytime-reader-template
    runtime: static
    buildCommand: |
      printf "{\"apiBase\":\"%s\",\"storyId\":\"%s\",\"storySlug\":\"%s\",\"packUrl\":\"%s\",\"instantAppId\":\"%s\",\"allowPackOverride\":%s}\n" "$VITE_API_HTTP_URL" "$VITE_STORY_ID" "$VITE_STORY_SLUG" "$VITE_STORY_PACK_URL" "$VITE_INSTANT_APP_ID" "${VITE_READER_ALLOW_PACK_OVERRIDE:-true}" > reader/runtime-config.json
    staticPublishPath: reader
    envVars:
      - key: VITE_API_HTTP_URL
        value: https://storytime-api-091733.onrender.com
      - key: VITE_STORY_ID
        value: demo
      - key: VITE_STORY_SLUG
        value: demo
      - key: VITE_STORY_PACK_URL
        value: https://storytime-api-091733.onrender.com/api/stories/demo/pack
      - key: VITE_INSTANT_APP_ID
        sync: false
      - key: VITE_READER_ALLOW_PACK_OVERRIDE
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: storytime-db
    plan: basic-256mb
    postgresMajorVersion: "16"
